<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Butterfly</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c" width="640" height="680"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;
const CX = W / 2;
const CY = H / 2 + 40; // center a bit low for antennae headroom

// Palette: lavender, rose-pink, sky-blue, straw, violet, salmon, pale-purple
const PALETTE = [
  [205, 150, 225],  // 0 lavender
  [225, 125, 170],  // 1 rose pink
  [120, 188, 225],  // 2 sky blue
  [228, 215, 110],  // 3 straw yellow
  [158,  95, 210],  // 4 deep violet
  [235, 158, 138],  // 5 salmon
  [185, 145, 230],  // 6 pale purple
];

function rgba(idx, a) {
  const [r,g,b] = PALETTE[idx % PALETTE.length];
  return `rgba(${r},${g},${b},${a.toFixed(3)})`;
}

// ── Wing paths ────────────────────────────────────────────────
// All drawn from origin (0,0) = body center, extending rightward.
// flapY: 1.0 = wings fully open, 0.18 = wings nearly closed.

function pathForewing(s, flapY) {
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(
    12*s,  -45*s*flapY,
    70*s, -108*s*flapY,
    128*s,  -75*s*flapY
  );
  ctx.bezierCurveTo(
    158*s,  -48*s*flapY,
    152*s,    6*s,
    116*s,   22*s
  );
  ctx.bezierCurveTo(
    76*s,    36*s,
    22*s,    18*s,
    0, 0
  );
  ctx.closePath();
}

function pathHindwing(s, flapY) {
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(
    20*s,   18*s,
    78*s,   68*s*flapY,
    116*s,  98*s*flapY
  );
  ctx.bezierCurveTo(
    142*s, 112*s*flapY,
    140*s,  66*s*flapY,
    102*s,  40*s
  );
  ctx.bezierCurveTo(
    65*s,   14*s,
    26*s,    6*s,
    0, 0
  );
  ctx.closePath();
}

// ── Edge lobes ─────────────────────────────────────────────────
// Small petal shapes along outer wing edges (like the reference).
// Drawn in world-space; side = 1 or -1 for symmetry.

function drawLobes(side, flapY, s, colorIdx, alpha) {
  // Forewing outer lobes
  const fLobes = [
    { cx: 130, cy: -75, rx: 22, ry: 13, a: -0.45 },
    { cx: 108, cy: -98, rx: 18, ry: 11, a: -0.80 },
    { cx:  78, cy:-103, rx: 16, ry: 10, a: -1.10 },
    { cx: 152, cy: -48, rx: 18, ry: 11, a: -0.10 },
    { cx: 148, cy: -20, rx: 16, ry: 10, a:  0.10 },
  ];
  // Hindwing outer lobes
  const hLobes = [
    { cx: 116, cy: 98,  rx: 20, ry: 12, a:  0.65 },
    { cx:  92, cy:108,  rx: 17, ry: 10, a:  0.95 },
    { cx: 136, cy: 74,  rx: 16, ry:  9, a:  0.30 },
  ];

  const all = [
    ...fLobes.map(l => ({ ...l, yScale: flapY })),
    ...hLobes.map(l => ({ ...l, yScale: flapY })),
  ];

  all.forEach(({ cx, cy, rx, ry, a, yScale }) => {
    ctx.save();
    ctx.translate(side * cx * s, cy * s * yScale);
    ctx.rotate(side * a);
    ctx.beginPath();
    ctx.ellipse(0, 0, rx*s, ry*s, 0, 0, Math.PI*2);
    ctx.fillStyle = rgba(colorIdx, alpha * 0.6);
    ctx.fill();
    ctx.strokeStyle = rgba(colorIdx, alpha * 1.6);
    ctx.lineWidth = 0.65;
    ctx.stroke();
    ctx.restore();
  });
}

// ── Inner loop decorations (near body, like reference) ─────────

function drawInnerLoops(flapY) {
  const loops = [
    { x:  55, y: -28, rx: 26, ry: 16, a: -0.30, c: 0 },
    { x:  72, y: -12, rx: 21, ry: 13, a:  0.20, c: 1 },
    { x:  48, y:  38, rx: 23, ry: 15, a:  0.40, c: 2 },
    { x:  82, y: -52, rx: 18, ry: 10, a: -0.55, c: 3 },
    { x:  35, y: -60, rx: 16, ry:  9, a: -0.80, c: 6 },
    { x:  60, y:  58, rx: 19, ry: 11, a:  0.60, c: 4 },
  ];

  loops.forEach(({ x, y, rx, ry, a, c }) => {
    const yPos = y * flapY;
    // right
    ctx.save();
    ctx.translate(CX + x, CY + yPos);
    ctx.rotate(a);
    ctx.beginPath();
    ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI*2);
    ctx.strokeStyle = rgba(c, 0.28);
    ctx.lineWidth = 0.75;
    ctx.stroke();
    ctx.restore();
    // left (mirror)
    ctx.save();
    ctx.translate(CX - x, CY + yPos);
    ctx.rotate(-a);
    ctx.beginPath();
    ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI*2);
    ctx.strokeStyle = rgba(c, 0.28);
    ctx.lineWidth = 0.75;
    ctx.stroke();
    ctx.restore();
  });
}

// ── Wing veins ──────────────────────────────────────────────────

function drawVeins(flapY) {
  const veins = [
    { p: [[0,0],[28,-38],[75,-68],[128,-75]], c: 4 },
    { p: [[0,0],[18,-18],[55,-52],[86,-98]], c: 0 },
    { p: [[0,0],[48, 4],[98,-12],[148,-38]], c: 6 },
    { p: [[0,0],[22, 28],[58, 68],[114, 96]], c: 2 },
    { p: [[0,0],[ 9, 14],[28, 44],[68, 88]], c: 3 },
    { p: [[0,0],[15,-30],[50,-72],[82,-102]], c: 1 },
  ];

  ctx.save();
  ctx.translate(CX, CY);

  [1, -1].forEach(side => {
    ctx.save();
    ctx.scale(side, 1);
    veins.forEach(({ p, c }) => {
      const [[x0,y0],[x1,y1],[x2,y2],[x3,y3]] = p;
      const fy = flapY;
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.bezierCurveTo(x1, y1*fy, x2, y2*fy, x3, y3*fy);
      ctx.strokeStyle = rgba(c, 0.20);
      ctx.lineWidth = 0.75;
      ctx.stroke();
    });
    ctx.restore();
  });

  ctx.restore();
}

// ── Main wing layers ────────────────────────────────────────────

function drawWings(flapY) {
  const LAYERS = 8;

  for (let L = 0; L < LAYERS; L++) {
    const t = L / (LAYERS - 1);           // 0→1
    const s = 1.0 + (1 - t) * 0.14;      // outer layers slightly larger
    const rotSpread = (t - 0.5) * 0.26;  // ±0.13 rad fan spread
    const alpha = 0.09 + 0.10 * Math.sin(t * Math.PI);
    const colorIdx = L % PALETTE.length;
    // Subtle flap stagger between layers (very slight phase offset)
    const layerFlapY = Math.max(0.15, flapY + (t - 0.5) * 0.04);

    [1, -1].forEach(side => {
      ctx.save();
      ctx.translate(CX, CY);
      ctx.scale(side, 1);
      ctx.rotate(rotSpread * side); // fan opens symmetrically

      pathForewing(s, layerFlapY);
      ctx.fillStyle = rgba(colorIdx, alpha);
      ctx.fill();
      ctx.strokeStyle = rgba(colorIdx, alpha * 1.8);
      ctx.lineWidth = 0.65;
      ctx.stroke();

      pathHindwing(s, layerFlapY);
      ctx.fillStyle = rgba(colorIdx, alpha);
      ctx.fill();
      ctx.strokeStyle = rgba(colorIdx, alpha * 1.8);
      ctx.lineWidth = 0.65;
      ctx.stroke();

      ctx.restore();

      // Lobes in world space
      ctx.save();
      ctx.translate(CX, CY);
      drawLobes(side, layerFlapY, s, colorIdx, alpha);
      ctx.restore();
    });
  }
}

// ── Body + antennae ─────────────────────────────────────────────

function drawBody() {
  ctx.save();
  ctx.translate(CX, CY);

  // Abdomen (tapers toward tail)
  ctx.beginPath();
  ctx.moveTo(-5.5, -8);
  ctx.bezierCurveTo(-7, 18, -5, 46, -2, 64);
  ctx.bezierCurveTo(-1, 68, 1, 68, 2, 64);
  ctx.bezierCurveTo(5, 46, 7, 18, 5.5, -8);
  ctx.closePath();
  ctx.fillStyle = 'rgba(55,25,85,0.72)';
  ctx.fill();

  // Thorax
  ctx.beginPath();
  ctx.ellipse(0, -16, 8, 18, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(65,30,95,0.80)';
  ctx.fill();

  // Head
  ctx.beginPath();
  ctx.arc(0, -36, 10, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(75,35,110,0.82)';
  ctx.fill();

  // Antennae stems
  ctx.strokeStyle = 'rgba(65,30,98,0.52)';
  ctx.lineWidth = 1.3;

  ctx.beginPath();
  ctx.moveTo(-3, -44);
  ctx.bezierCurveTo(-20, -72, -40, -88, -44, -118);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(3, -44);
  ctx.bezierCurveTo(20, -72, 40, -88, 44, -118);
  ctx.stroke();

  // Antenna knobs
  ctx.fillStyle = 'rgba(65,30,98,0.60)';
  ctx.beginPath(); ctx.arc(-44, -118, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 44, -118, 5, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

// ── Animation loop ──────────────────────────────────────────────

const t0 = performance.now();

function frame() {
  const t = (performance.now() - t0) / 1000;

  ctx.clearRect(0, 0, W, H);

  // flapY oscillates 0.18 → 1.0, period ≈ 8 s
  const flapY = 0.18 + 0.82 * (Math.sin(t * 0.78) * 0.5 + 0.5);

  drawWings(flapY);
  drawVeins(flapY);
  drawInnerLoops(flapY);
  drawBody();

  requestAnimationFrame(frame);
}

frame();
</script>
</body>
</html>
