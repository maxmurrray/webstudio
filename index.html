<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio 33</title>
  <link rel="stylesheet" href="https://use.typekit.net/dlk5fdl.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'basic-sans', 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── DREAMY GRADIENT BG (BREZ palette) ── */
    #bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 15% 25%, rgba(255,168,148,0.75) 0%, transparent 48%),
        radial-gradient(ellipse at 82% 18%, rgba(205,175,255,0.75) 0%, transparent 48%),
        radial-gradient(ellipse at 55% 85%, rgba(140,195,255,0.70) 0%, transparent 45%),
        radial-gradient(ellipse at 72% 58%, rgba(255,195,220,0.65) 0%, transparent 40%),
        radial-gradient(ellipse at 28% 72%, rgba(195,230,255,0.60) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 50%, rgba(255,240,245,0.50) 0%, transparent 70%),
        linear-gradient(145deg, #FFE8D8, #F8D5E8, #E8D0F8, #C8DEFF, #D0F0FF);
      animation: drift 12s ease-in-out infinite alternate;
    }
    @keyframes drift {
      0%   { filter: hue-rotate(0deg)   saturate(1.0); }
      50%  { filter: hue-rotate(8deg)   saturate(1.08); }
      100% { filter: hue-rotate(-5deg)  saturate(1.04); }
    }

    /* ── BUTTERFLY ── */
    #butterfly {
      position: fixed;
      width: 320px;
      height: 320px;
      margin-left: -160px;
      margin-top: -160px;
      z-index: 50;
      pointer-events: none;
    }

    /* Split butterfly into left/right wings using background-image */
    .wing {
      position: absolute;
      top: 0;
      height: 100%;
      width: 50%;
      background-image: url(butterfly.png);
      background-size: 200% 100%;
      background-repeat: no-repeat;
      mix-blend-mode: screen;
      opacity: 0.88;
    }

    .wing-l {
      left: 0;
      background-position: left center;
      transform-origin: right center;
      animation: flap-l 0.65s cubic-bezier(0.45, 0, 0.55, 1) infinite;
    }

    .wing-r {
      right: 0;
      background-position: right center;
      transform-origin: left center;
      animation: flap-r 0.65s cubic-bezier(0.45, 0, 0.55, 1) infinite;
    }

    @keyframes flap-l {
      0%, 100% { transform: perspective(500px) rotateY(0deg); }
      50%       { transform: perspective(500px) rotateY(62deg); }
    }
    @keyframes flap-r {
      0%, 100% { transform: perspective(500px) rotateY(0deg); }
      50%       { transform: perspective(500px) rotateY(-62deg); }
    }

    /* ── CONTENT ── */
    #content {
      position: fixed; inset: 0;
      z-index: 100;
      pointer-events: none;
    }

    #wordmark {
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 38px;
      font-weight: 700;
      color: #1e0a2e;
      letter-spacing: 0.06em;
      white-space: nowrap;
      pointer-events: auto;
    }

    #nav {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 80px;
      align-items: center;
      pointer-events: auto;
      /* push nav slightly below center so butterfly has room */
      margin-top: 160px;
    }

    #nav a {
      font-size: 20px;
      font-weight: 700;
      color: #1e0a2e;
      text-decoration: none;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s, text-shadow 0.2s;
    }
    #nav a:hover {
      color: #9B59B6;
      text-shadow: 0 0 16px rgba(180,120,255,0.5);
    }

    #copy {
      position: absolute;
      bottom: 14px;
      left: 16px;
      font-size: 38px;
      font-weight: 700;
      color: #1e0a2e;
      line-height: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>

<div id="bg"></div>

<div id="butterfly">
  <div class="wing wing-l"></div>
  <div class="wing wing-r"></div>
</div>

<div id="content">
  <div id="wordmark">STUDIO 33</div>
  <nav id="nav">
    <a href="#">ABOUT</a>
    <a href="#">PORTFOLIO</a>
    <a href="#">CONTACT</a>
  </nav>
  <div id="copy">©</div>
</div>

<script>
const b = document.getElementById('butterfly');
const cx = () => window.innerWidth  / 2;
const cy = () => window.innerHeight / 2;

let t = 0;

// Figure-8 Lissajous path — butterfly drifts gently through center
function move() {
  t += 0.006;

  // Lissajous figure-8: x oscillates at 1x, y at 2x
  const x = cx() + 200 * Math.sin(t);
  const y = cy() + 75  * Math.sin(2 * t) - 60; // shift up slightly

  b.style.left = x + 'px';
  b.style.top  = y + 'px';

  // tilt the butterfly slightly in the direction of travel
  const dx = 200 * 0.006 * Math.cos(t);
  const dy = 75  * 0.006 * 2 * Math.cos(2 * t);
  const tilt = Math.atan2(dy, dx) * (180 / Math.PI) * 0.3;
  b.style.transform = `rotate(${tilt}deg)`;

  requestAnimationFrame(move);
}

move();
</script>

</body>
</html>
