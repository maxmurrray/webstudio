<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio 33</title>
  <link rel="stylesheet" href="https://use.typekit.net/dlk5fdl.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #00421E;
      overflow: hidden;
      font-family: 'basic-sans', 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── GRID ── */
    #grid {
      position: fixed;
      inset: 0;
      display: grid;
    }

    .motif {
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0s;
    }
    .motif.clear { opacity: 0; pointer-events: none; }

    .motif svg { width: 100%; height: 100%; display: block; }

    .m3 {
      fill: #8D0405;
      font-family: 'basic-sans', serif;
      font-size: 67.71px;
      font-weight: 700;
    }

    @keyframes spark {
      0%   { filter: none; }
      18%  { filter: drop-shadow(0 0 7px #FFD060) drop-shadow(0 0 16px #FF8C00) brightness(2.4); }
      50%  { filter: drop-shadow(0 0 4px #FFB347) drop-shadow(0 0 10px #FF6600) brightness(1.5); }
      100% { filter: none; }
    }
    .motif.glow svg { animation: spark 1.9s ease-out forwards; }

    /* ── CONTENT ── */
    #content {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    /* STUDIO 33 — top center, NO underline */
    #wordmark {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 42px;
      font-weight: 700;
      color: #000;
      letter-spacing: 0.05em;
      white-space: nowrap;
      pointer-events: auto;
      -webkit-text-stroke: 0.6px #000;
    }

    /* Nav — centered */
    #nav {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 80px;
      align-items: center;
      pointer-events: auto;
    }

    #nav a {
      font-size: 42px;
      font-weight: 700;
      color: #000;
      text-decoration: none;
      letter-spacing: 0.05em;
      cursor: pointer;
      white-space: nowrap;
      -webkit-text-stroke: 0.6px #000;
      transition: color 0.15s, text-shadow 0.15s;
    }
    #nav a:hover {
      color: #FFD060;
      text-shadow: 0 0 20px rgba(255,180,0,0.65);
      -webkit-text-stroke: 0.6px #FFD060;
    }

    /* © bottom left */
    #copy {
      position: absolute;
      bottom: 12px;
      left: 16px;
      font-size: 42px;
      font-weight: 700;
      color: #000;
      line-height: 1;
      pointer-events: auto;
      -webkit-text-stroke: 0.6px #000;
    }
  </style>
</head>
<body>

<div id="grid"></div>

<div id="content">
  <div id="wordmark">STUDIO 33</div>
  <nav id="nav">
    <a href="#">ABOUT</a>
    <a href="#">PORTFOLIO</a>
    <a href="#">CONTACT</a>
  </nav>
  <div id="copy">©</div>
</div>

<script>
// Target cell size — slightly smaller than before
const TARGET_W = 46, TARGET_H = 58;

const grid = document.getElementById('grid');
let motifs = [], gridCols = 0, gridRows = 0, cellW = 0, cellH = 0;

function buildGrid() {
  grid.innerHTML = '';
  motifs = [];

  // Fit cells exactly — no partial/cut-off cells on any edge
  gridCols = Math.round(window.innerWidth  / TARGET_W);
  gridRows = Math.round(window.innerHeight / TARGET_H);
  cellW = window.innerWidth  / gridCols;
  cellH = window.innerHeight / gridRows;

  grid.style.gridTemplateColumns = `repeat(${gridCols}, ${cellW}px)`;
  grid.style.gridTemplateRows    = `repeat(${gridRows}, ${cellH}px)`;

  for (let i = 0; i < gridCols * gridRows; i++) {
    const d = document.createElement('div');
    d.className = 'motif';
    d.innerHTML = `<svg viewBox="0 0 61.16 76.04" xmlns="http://www.w3.org/2000/svg">
      <text class="m3" x="21.96" y="56.2">3</text>
      <text class="m3" transform="translate(39.21 56.2) rotate(-180) scale(1 -1)">3</text>
    </svg>`;
    grid.appendChild(d);
    motifs.push(d);
  }

  // Clear cells behind text elements after layout paints
  requestAnimationFrame(clearTextCells);
}

function clearTextCells() {
  const textEls = [
    document.getElementById('wordmark'),
    document.getElementById('nav'),
    document.getElementById('copy'),
  ];

  // Reset all first
  motifs.forEach(m => m.classList.remove('clear'));

  const pad = 10; // breathing room around each text block

  textEls.forEach(el => {
    const r = el.getBoundingClientRect();
    const c1 = Math.floor((r.left   - pad) / cellW);
    const c2 = Math.ceil( (r.right  + pad) / cellW);
    const r1 = Math.floor((r.top    - pad) / cellH);
    const r2 = Math.ceil( (r.bottom + pad) / cellH);

    for (let row = r1; row <= r2; row++) {
      for (let col = c1; col <= c2; col++) {
        if (row < 0 || col < 0 || row >= gridRows || col >= gridCols) continue;
        const idx = row * gridCols + col;
        if (motifs[idx]) motifs[idx].classList.add('clear');
      }
    }
  });
}

function triggerGlow() {
  // Only glow visible motifs
  const visible = motifs.filter(m => !m.classList.contains('clear'));
  if (!visible.length) return;
  const el = visible[Math.floor(Math.random() * visible.length)];
  el.classList.remove('glow');
  void el.offsetWidth;
  el.classList.add('glow');
  el.addEventListener('animationend', () => el.classList.remove('glow'), { once: true });
  setTimeout(triggerGlow, 500 + Math.random() * 1600);
}

buildGrid();
window.addEventListener('resize', () => { buildGrid(); });
setTimeout(triggerGlow, 900);
</script>

</body>
</html>
