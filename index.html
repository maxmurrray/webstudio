<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio — We Build It. You Run It.</title>
  <link rel="stylesheet" href="https://use.typekit.net/dlk5fdl.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #fff;
      color: #000;
      font-family: 'basic-sans', 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
    }

    /* fire lives on top of everything */
    #fire-canvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 200;
    }

    /* main text block */
    .wrap {
      position: absolute;
      top: 24vh; left: 48px;
      z-index: 10;
    }

    .headline {
      font-size: clamp(60px, 9.2vw, 130px);
      font-weight: 700;
      line-height: 1.06;
      letter-spacing: -0.01em;
      color: #000;
    }

    #cursor {
      display: inline-block;
      width: 3px; height: 0.82em;
      background: #000;
      vertical-align: -0.04em;
      margin-left: 4px;
      animation: blink 0.55s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── NAV ── */
    .nav {
      margin-top: 40px;
      display: flex;
      gap: 52px;
      opacity: 0;
    }
    .nav a {
      font-family: 'basic-sans', 'Helvetica Neue', Arial, sans-serif;
      font-size: 12px; font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #000; text-decoration: none;
    }

    /* burn-in effect per letter */
    .nav.burnt a {
      opacity: 0;
      animation: char-burn 2.2s ease-out forwards;
    }
    .nav.burnt a:nth-child(1) { animation-delay: 0ms;   }
    .nav.burnt a:nth-child(2) { animation-delay: 180ms; }
    .nav.burnt a:nth-child(3) { animation-delay: 360ms; }

    @keyframes char-burn {
      0%   { opacity: 0; color: #fff; text-shadow: 0 0 30px #ff6600, 0 0 60px #ff2200; letter-spacing: 0.3em; }
      15%  { opacity: 1; color: #ff4400; text-shadow: 0 0 20px #ff6600, 0 0 40px #ff3300; }
      45%  { color: #993300; text-shadow: 0 0 10px #ff6600; letter-spacing: 0.22em; }
      80%  { color: #331100; text-shadow: 0 0 4px #884400; }
      100% { color: #000; text-shadow: none; letter-spacing: 0.18em; }
    }

    /* ── DRAGON ── */
    #dragon-wrap {
      position: fixed;
      bottom: 6vh;
      left: 0;
      width: 62vw;
      z-index: 100;
      transform: translateX(110vw);           /* off-screen right to start */
      mix-blend-mode: multiply;              /* white bg in image = transparent on white page */
      filter: drop-shadow(0 24px 48px rgba(0,0,0,0.25))
              drop-shadow(0 8px 18px rgba(0,0,0,0.18));
      will-change: transform;
    }
    #dragon-wrap img {
      width: 100%; height: auto; display: block;
    }

    /* 1. crawl in */
    #dragon-wrap.crawling {
      transition: transform 3.2s cubic-bezier(0.23, 1, 0.32, 1);
      transform: translateX(6vw);
    }
    /* 2. idle undulation while breathing */
    #dragon-wrap.breathing {
      animation: undulate 0.9s ease-in-out infinite;
    }
    @keyframes undulate {
      0%,100% { transform: translateX(6vw) translateY(0px); }
      50%      { transform: translateX(6vw) translateY(-10px); }
    }
  </style>
</head>
<body>

<canvas id="fire-canvas"></canvas>

<div class="wrap">
  <div class="headline"><span id="typed"></span><span id="cursor"></span></div>
  <nav class="nav" id="nav">
    <a href="#">ABOUT</a>
    <a href="#">PORTFOLIO</a>
    <a href="#">CONTACT</a>
  </nav>
</div>

<div id="dragon-wrap">
  <img src="dragon.png" alt="">
</div>

<script>
// ══════════════════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════════════════
let _actx = null;
function actx() {
  if (!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)();
  return _actx;
}

// mechanical keyboard click
function playClick() {
  try {
    const c = actx(), t = c.currentTime;
    const len = Math.floor(c.sampleRate * 0.032);
    const buf = c.createBuffer(1, len, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(len*0.15));
    const src = c.createBufferSource(); src.buffer = buf;
    const bp = c.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=3400; bp.Q.value=1.4;
    const g = c.createGain(); g.gain.setValueAtTime(0.28,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.032);
    src.connect(bp); bp.connect(g); g.connect(c.destination); src.start();
  } catch(e) {}
}

// dragon roar + fire crackle
function playRoar() {
  try {
    const c = actx(), t = c.currentTime;
    // low rumbling roar
    [[55,0.14],[110,0.09],[165,0.06]].forEach(([freq,vol],i)=>{
      const o = c.createOscillator(); o.type = i===0 ? 'sawtooth' : 'triangle';
      o.frequency.setValueAtTime(freq * (0.85+Math.random()*0.3), t);
      o.frequency.exponentialRampToValueAtTime(freq*0.25, t+2.2);
      const g = c.createGain(); g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+2.4);
      o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+2.5);
    });
    // fire noise
    const blen = Math.floor(c.sampleRate * 3);
    const fbuf = c.createBuffer(1, blen, c.sampleRate);
    const fd = fbuf.getChannelData(0);
    for (let i=0; i<blen; i++) fd[i] = (Math.random()*2-1) * Math.pow(1 - i/blen, 0.4);
    const ns = c.createBufferSource(); ns.buffer = fbuf;
    const lp = c.createBiquadFilter(); lp.type='bandpass'; lp.frequency.value=700; lp.Q.value=0.6;
    const ng = c.createGain(); ng.gain.setValueAtTime(0,t); ng.gain.linearRampToValueAtTime(0.18, t+0.4); ng.gain.exponentialRampToValueAtTime(0.001, t+3);
    ns.connect(lp); lp.connect(ng); ng.connect(c.destination); ns.start(t);
  } catch(e) {}
}

// ══════════════════════════════════════════════════════
// FIRE PARTICLE SYSTEM
// ══════════════════════════════════════════════════════
const fCv  = document.getElementById('fire-canvas');
const fCtx = fCv.getContext('2d');
let FW, FH;
function resizeFire() { FW = fCv.width = innerWidth; FH = fCv.height = innerHeight; }
resizeFire(); window.addEventListener('resize', resizeFire);

let particles  = [];
let fireOn     = false;
let fireTick   = 0;
let fireAmt    = 0;  // 0‒1 intensity

// get dragon head position in screen coords
function headPos() {
  const r = document.getElementById('dragon-wrap').getBoundingClientRect();
  return {
    x: r.left + r.width  * 0.10,  // left ~10% = snout area
    y: r.top  + r.height * 0.30   // upper portion = head height
  };
}

function spawnFire() {
  const h = headPos();
  const n = Math.ceil(fireAmt * 18);
  for (let i = 0; i < n; i++) {
    // shoot left and upward toward nav area
    const spread = 0.55;
    const base = -Math.PI * 0.80;  // roughly left + slightly up
    const ang  = base + (Math.random() - 0.5) * spread;
    const spd  = 5 + Math.random() * 10;
    const life = 45 + Math.random() * 50;
    particles.push({
      x: h.x + (Math.random()-0.5)*24, y: h.y + (Math.random()-0.5)*16,
      vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 0.5,
      life, maxLife: life,
      size: 8 + Math.random()*18,
      hot: Math.random()
    });
  }
}

function drawFire() {
  fCtx.clearRect(0,0,FW,FH);

  if (fireOn) {
    spawnFire(); fireTick++;
    if      (fireTick < 25)               fireAmt = fireTick / 25;
    else if (fireTick < 100)              fireAmt = 1;
    else if (fireTick < 155) { fireAmt = 1 - (fireTick-100)/55; }
    else { fireAmt = 0; fireOn = false; }
  }

  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy -= 0.18;   // heat rises
    p.vx *= 0.975;
    p.size *= 0.984;
    p.life--;
    if (p.life <= 0 || p.size < 0.8) { particles.splice(i,1); continue; }

    const t = p.life / p.maxLife;
    let r,g,b;
    if      (p.hot > 0.65) { r=255; g=Math.floor(220+35*t); b=Math.floor(120*t); }  // white-hot
    else if (p.hot > 0.35) { r=255; g=Math.floor(140*t+60); b=0; }                   // yellow-orange
    else                   { r=255; g=Math.floor(60*t);      b=0; }                   // deep red

    fCtx.save();
    fCtx.globalAlpha = t * 0.88;
    const gr = fCtx.createRadialGradient(p.x,p.y,0, p.x,p.y,p.size);
    gr.addColorStop(0,   `rgba(${r},${g},${b},1)`);
    gr.addColorStop(0.45,`rgba(${r},${Math.floor(g*0.5)},0,0.65)`);
    gr.addColorStop(1,   `rgba(200,0,0,0)`);
    fCtx.fillStyle = gr;
    fCtx.beginPath(); fCtx.arc(p.x,p.y,p.size,0,Math.PI*2); fCtx.fill();
    fCtx.restore();
  }
  requestAnimationFrame(drawFire);
}
drawFire();

// ══════════════════════════════════════════════════════
// TYPING
// ══════════════════════════════════════════════════════
const LINE1 = 'WE BUILD IT.';
const LINE2 = 'YOU RUN IT.';
const FULL  = LINE1 + '\n' + LINE2;

const typedEl   = document.getElementById('typed');
const cursorEl  = document.getElementById('cursor');
const navEl     = document.getElementById('nav');
const dragonEl  = document.getElementById('dragon-wrap');

let idx = 0;

function render() {
  const s = FULL.slice(0, idx);
  const nl = s.indexOf('\n');
  typedEl.innerHTML = nl === -1 ? s : s.slice(0,nl) + '<br>' + s.slice(nl+1);
}

function type() {
  if (idx >= FULL.length) {
    // done — blink ~1s, fade cursor, release the dragon
    setTimeout(() => {
      cursorEl.style.animation = 'none';
      cursorEl.style.transition = 'opacity 0.3s';
      cursorEl.style.opacity = '0';
      setTimeout(dragonSequence, 500);
    }, 950);
    return;
  }
  const ch = FULL[idx++];
  render();
  if (ch !== '\n') playClick();
  let d = 180 + (Math.random()*80 - 30);
  if (ch === '.') d += 200;
  if (ch === ' ') d -= 30;
  setTimeout(type, Math.max(80, d));
}

// ══════════════════════════════════════════════════════
// DRAGON SEQUENCE
// ══════════════════════════════════════════════════════
function dragonSequence() {
  // 1. crawl in from right
  dragonEl.classList.add('crawling');

  // 2. after crawl completes (~3.2s): roar, undulate, breathe fire
  setTimeout(() => {
    dragonEl.classList.add('breathing');
    playRoar();

    // fire starts 0.6s into roar
    setTimeout(() => {
      fireOn = true; fireTick = 0; fireAmt = 0;

      // nav reveals 1.1s into fire (as flames wash over it)
      setTimeout(() => {
        navEl.style.opacity = '1';
        navEl.classList.add('burnt');
      }, 1100);

    }, 600);

  }, 3400);
}

// go
setTimeout(type, 600);
</script>
</body>
</html>
