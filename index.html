<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio 33</title>
  <link rel="stylesheet" href="https://use.typekit.net/dlk5fdl.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #00421E;
      overflow: hidden;
      font-family: 'basic-sans', 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── MOTIF GRID ── */
    #grid {
      position: fixed;
      inset: 0;
      display: grid;
      overflow: hidden;
    }

    .motif {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .motif svg { width: 100%; height: 100%; display: block; }

    .m3 {
      fill: #8D0405;
      font-family: 'basic-sans', serif;
      font-size: 67.71px;
      font-weight: 700;
    }

    /* glow: warm amber ember spark */
    @keyframes spark {
      0%   { filter: none; }
      18%  { filter: drop-shadow(0 0 6px #FFD060) drop-shadow(0 0 14px #FF8C00) brightness(2.2); }
      45%  { filter: drop-shadow(0 0 4px #FFB347) drop-shadow(0 0 9px #FF6600)  brightness(1.5); }
      100% { filter: none; }
    }
    .motif.glow svg { animation: spark 1.8s ease-out forwards; }

    /* ── CONTENT LAYER ── */
    #content {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    /* STUDIO 33 — top center */
    #wordmark {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 36px;
      font-weight: 700;
      color: #000;
      letter-spacing: 0.06em;
      text-decoration: underline;
      text-underline-offset: 5px;
      white-space: nowrap;
      pointer-events: auto;
    }

    /* Nav — vertically + horizontally centered */
    #nav {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 72px;
      align-items: center;
      pointer-events: auto;
    }

    #nav a {
      font-size: 34px;
      font-weight: 700;
      color: #000;
      text-decoration: none;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: color 0.15s, text-shadow 0.15s;
    }
    #nav a:hover {
      color: #FFD060;
      text-shadow: 0 0 18px rgba(255,180,0,0.6);
    }

    /* © — bottom left */
    #copy {
      position: absolute;
      bottom: 10px;
      left: 14px;
      font-size: 40px;
      font-weight: 700;
      color: #000;
      line-height: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>

<div id="grid"></div>

<div id="content">
  <div id="wordmark">STUDIO 33</div>
  <nav id="nav">
    <a href="#">ABOUT</a>
    <a href="#">PORTFOLIO</a>
    <a href="#">CONTACT</a>
  </nav>
  <div id="copy">©</div>
</div>

<script>
const CELL_W = 52, CELL_H = 65;
const grid = document.getElementById('grid');
let motifs = [];

function buildGrid() {
  grid.innerHTML = '';
  motifs = [];
  const cols = Math.ceil(window.innerWidth  / CELL_W) + 1;
  const rows = Math.ceil(window.innerHeight / CELL_H) + 1;
  grid.style.gridTemplateColumns = `repeat(${cols}, ${CELL_W}px)`;
  grid.style.gridTemplateRows    = `repeat(${rows}, ${CELL_H}px)`;

  for (let i = 0; i < cols * rows; i++) {
    const d = document.createElement('div');
    d.className = 'motif';
    // Two mirrored "3"s — exact transforms from the logo SVG
    d.innerHTML = `<svg viewBox="0 0 61.16 76.04" xmlns="http://www.w3.org/2000/svg">
      <text class="m3" x="21.96" y="56.2">3</text>
      <text class="m3" transform="translate(39.21 56.2) rotate(-180) scale(1 -1)">3</text>
    </svg>`;
    grid.appendChild(d);
    motifs.push(d);
  }
}

function triggerGlow() {
  if (!motifs.length) return;
  const el = motifs[Math.floor(Math.random() * motifs.length)];
  el.classList.remove('glow');
  void el.offsetWidth; // reflow to restart animation
  el.classList.add('glow');
  el.addEventListener('animationend', () => el.classList.remove('glow'), { once: true });
  // next glow after random pause — feels organic, not mechanical
  setTimeout(triggerGlow, 500 + Math.random() * 1600);
}

buildGrid();
window.addEventListener('resize', buildGrid);

// let the font load before starting glow
setTimeout(triggerGlow, 900);
</script>

</body>
</html>
